services:
  - type: web
    name: nellis-dashboard-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://bidflow-app.vercel.app,https://nellis-auction.vercel.app
